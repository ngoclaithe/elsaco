# elSaco — HTTP only (chạy trước khi xin certbot)
# Copy: sudo cp deploy/nginx/elsaco.dosutech.site.conf /etc/nginx/sites-available/
# Enable: sudo ln -sf /etc/nginx/sites-available/elsaco.dosutech.site.conf /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name elsaco.dosutech.site;

    # Certbot webroot (dùng khi xin SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:4020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
