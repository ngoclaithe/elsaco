# elSaco API — HTTP only (chạy trước khi xin certbot)
# Copy: sudo cp deploy/nginx/api-elsaco.dosutech.site.conf /etc/nginx/sites-available/
# Enable: sudo ln -sf /etc/nginx/sites-available/api-elsaco.dosutech.site.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api-elsaco.dosutech.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie auth cross-subdomain
        proxy_set_header Cookie $http_cookie;
    }
}
